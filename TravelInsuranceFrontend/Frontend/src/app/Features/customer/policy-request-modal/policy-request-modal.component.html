<app-modal [isOpen]="isOpen" [title]="'Request Plan: ' + (selectedPlan?.policyName || '')" (closeModal)="close()">
    <form [formGroup]="requestForm" (ngSubmit)="submitRequest()" class="space-y-6">

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <!-- Destination -->
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Destination</label>
                <input type="text" formControlName="destination" class="w-full px-4 py-2 border rounded-xl"
                    placeholder="e.g. Rome, Italy" />
                <span class="text-xs text-red-500"
                    *ngIf="requestForm.get('destination')?.invalid && requestForm.get('destination')?.touched">Destination
                    is required.</span>
            </div>

            <!-- Dates -->
            <div class="grid grid-cols-2 gap-2">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Start Date</label>
                    <input type="date" formControlName="startDate" [min]="today"
                        class="w-full px-4 py-2 border rounded-xl" />
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">End Date</label>
                    <input type="date" formControlName="endDate" [min]="requestForm.get('startDate')?.value || today"
                        class="w-full px-4 py-2 border rounded-xl" />
                </div>
            </div>

            <!-- Traveller Details -->
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Traveller Name</label>
                <input type="text" formControlName="travellerName" class="w-full px-4 py-2 border rounded-xl" />
            </div>

            <div class="grid grid-cols-2 gap-2">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Age</label>
                    <input type="number" formControlName="travellerAge" class="w-full px-4 py-2 border rounded-xl" />
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Passport Number</label>
                    <input type="text" formControlName="passportNumber" class="w-full px-4 py-2 border rounded-xl" />
                </div>
            </div>

            <!-- KYC Details -->
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">KYC Type</label>
                <select formControlName="kycType" class="w-full px-4 py-2 border rounded-xl bg-white">
                    <option value="Aadhaar">Aadhaar</option>
                    <option value="PAN">PAN</option>
                    <option value="DriverLicense">Driver's License</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">KYC Number</label>
                <input type="text" formControlName="kycNumber" class="w-full px-4 py-2 border rounded-xl" />
            </div>
        </div>

        <div class="border-t pt-4 space-y-4">
            <h3 class="text-sm font-bold text-[#E8584A] uppercase tracking-widest">Required Documents <span
                    class="text-xs text-gray-400 lowercase font-normal">(PDF, JPG, PNG - Max 5MB)</span></h3>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <!-- KYC Doc -->
                <div class="border rounded-xl p-3 bg-gray-50">
                    <label class="block text-xs font-bold text-gray-700 mb-2">KYC Document *</label>
                    <input type="file" accept=".pdf,.jpg,.jpeg,.png" (change)="onFileSelected($event, 'kyc')"
                        class="text-xs w-full cursor-pointer" />
                </div>

                <!-- Passport Doc -->
                <div class="border rounded-xl p-3 bg-gray-50">
                    <label class="block text-xs font-bold text-gray-700 mb-2">Passport Document *</label>
                    <input type="file" accept=".pdf,.jpg,.jpeg,.png" (change)="onFileSelected($event, 'passport')"
                        class="text-xs w-full cursor-pointer" />
                </div>

                <!-- Other Doc -->
                <div class="border rounded-xl p-3 bg-gray-50">
                    <label class="block text-xs font-bold text-gray-700 mb-2">Other Document (Optional)</label>
                    <input type="file" accept=".pdf,.jpg,.jpeg,.png" (change)="onFileSelected($event, 'other')"
                        class="text-xs w-full cursor-pointer" />
                </div>
            </div>
        </div>

        <!-- Actions -->
        <div class="flex justify-end gap-3 pt-4 border-t mt-6">
            <button type="button" (click)="close()"
                class="px-6 py-3 rounded-xl font-bold text-gray-600 bg-gray-100 hover:bg-gray-200 transition-colors">
                Cancel
            </button>
            <button type="submit" [disabled]="isSubmitting"
                class="px-6 py-3 rounded-xl font-bold bg-[#E8584A] text-white disabled:opacity-50 hover:bg-red-600 transition-colors flex items-center gap-2 shadow-[0_4px_14px_rgba(232,88,74,0.3)]">
                <span *ngIf="isSubmitting"
                    class="w-4 h-4 rounded-full border-2 border-white border-t-transparent animate-spin"></span>
                Submit Request
            </button>
        </div>

    </form>
</app-modal>
