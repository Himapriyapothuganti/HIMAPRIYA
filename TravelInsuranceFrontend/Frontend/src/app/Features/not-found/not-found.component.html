<!DOCTYPE html>
<div class="not-found-wrapper">

    <!-- Animated Background Blobs -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="not-found-card">

        <!-- 404 Number -->
        <div class="error-code">404</div>

        <!-- Plane Icon -->
        <div class="plane-icon">✈</div>

        <!-- Title & Message -->
        <h1 class="title">Page Not Found</h1>
        <p class="subtitle">
            Looks like this destination doesn't exist.<br>
            Let's get you back on track.
        </p>

        <!-- Go Home Button -->
        <button class="go-home-btn" (click)="goHome()">
            Go to Dashboard
        </button>

    </div>

</div>

<style>
    .not-found-wrapper {
        min-height: 100vh;
        background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Poppins', sans-serif;
        position: relative;
        overflow: hidden;
    }

    /* Blobs */
    .blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.25;
        animation: float 8s ease-in-out infinite;
    }

    .blob-1 {
        width: 400px;
        height: 400px;
        background: #E8584A;
        top: -80px;
        left: -100px;
    }

    .blob-2 {
        width: 350px;
        height: 350px;
        background: #6c63ff;
        bottom: -80px;
        right: -80px;
        animation-delay: 3s;
    }

    @keyframes float {

        0%,
        100% {
            transform: translateY(0px);
        }

        50% {
            transform: translateY(-30px);
        }
    }

    /* Card */
    .not-found-card {
        position: relative;
        z-index: 10;
        background: rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 32px;
        padding: 60px 70px;
        text-align: center;
        max-width: 480px;
        width: 90%;
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4);
        animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(30px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* 404 Number */
    .error-code {
        font-size: 100px;
        font-weight: 900;
        line-height: 1;
        background: linear-gradient(135deg, #E8584A, #ff9a6c);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: -4px;
    }

    /* Plane */
    .plane-icon {
        font-size: 48px;
        margin: 12px 0;
        display: inline-block;
        animation: plane 3s ease-in-out infinite;
    }

    @keyframes plane {

        0%,
        100% {
            transform: translateX(0) rotate(0deg);
        }

        50% {
            transform: translateX(14px) rotate(5deg);
        }
    }

    /* Title */
    .title {
        font-size: 26px;
        font-weight: 700;
        color: #ffffff;
        margin: 8px 0 12px;
    }

    /* Subtitle */
    .subtitle {
        font-size: 15px;
        color: rgba(255, 255, 255, 0.6);
        line-height: 1.7;
        margin-bottom: 36px;
    }

    /* Button */
    .go-home-btn {
        background: linear-gradient(135deg, #E8584A, #C94035);
        color: white;
        border: none;
        padding: 14px 40px;
        border-radius: 50px;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 8px 24px rgba(232, 88, 74, 0.35);
        transition: all 0.3s ease;
        font-family: 'Poppins', sans-serif;
    }

    .go-home-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 30px rgba(232, 88, 74, 0.5);
    }

    .go-home-btn:active {
        transform: translateY(0);
    }
</style>
